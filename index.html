<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>产品使用教程</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#f5f7fa;padding:20px;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
  .container{max-width:600px;margin:0 auto}
  .header{text-align:center;margin-bottom:25px}
  .header h1{font-size:22px;color:#333;margin-bottom:8px}
  .header p{color:#666;font-size:14px}
  .video-list{display:flex;flex-direction:column;gap:15px}
  .video-card{background:#fff;border-radius:12px;padding:16px;box-shadow:0 2px 8px rgba(0,0,0,0.08)}
  .video-title{font-size:16px;font-weight:500;color:#333;margin-bottom:12px}
  .video-container{position:relative;width:100%;height:0;padding-bottom:56.25%;border-radius:8px;overflow:hidden}
  .video-container iframe{position:absolute;left:0;top:0;width:100%;height:100%}
  .empty-tip{text-align:center;padding:50px 0;color:#999}
  /* 高清按钮样式 */
  .hd-btn{margin-top:12px;padding:8px 16px;background:#00a1d6;color:#fff;border:none;border-radius:6px;width:100%;font-size:14px;cursor:pointer;}
  .hd-tip{text-align:center;margin-top:8px;color:#666;font-size:12px;line-height:1.5;}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1 id="pageTitle">产品使用教程</h1>
    <p id="pageDesc">点击视频即可播放，支持全屏观看</p>
  </div>
  <div id="content"></div>
</div>

<script src="./config.js"></script>

<script>
function getUrlParam(name) {
  const params = new URLSearchParams(window.location.search);
  return params.get(name);
}

// 主动跳转B站高清（带确认弹窗）
function goToBilibili(bvid) {
  if(confirm('即将跳转至B站网页，您可自行选择更高视频清晰度观看')){
    window.open('https://www.bilibili.com/video/'+bvid, '_blank');
  }
}

function renderPage() {
  const groupId = getUrlParam('group');
  const videoId = getUrlParam('v');
  const content = document.getElementById('content');
  const pageTitle = document.getElementById('pageTitle');
  const pageDesc = document.getElementById('pageDesc');

  // 单个视频模式
  if (videoId) {
    const videoTitle = CONFIG.videos[videoId];
    if (!videoTitle) {
      content.innerHTML = '<div class="empty-tip">该视频不存在</div>';
      return;
    }
    pageTitle.textContent = videoTitle;
    content.innerHTML = `
      <div class="video-card">
        <div class="video-container">
          <iframe src="//player.bilibili.com/player.html?bvid=${videoId}&page=1&danmaku=0&high_quality=1&as_wide=1&no_recommend=1&hide_cover=1" scrolling="no" border="0" frameborder="no" framespacing="0" allowfullscreen="true" sandbox="allow-same-origin allow-scripts"></iframe>
        </div>
        <button class="hd-btn" onclick="goToBilibili('${videoId}')">点此前往B站切换1080P高清</button>
        <div class="hd-tip">默认标准画质播放，若需更高清晰度，可点击按钮跳转B站自行调节</div>
      </div>
    `;
    return;
  }

  // 分组模式（单视频）
  if (groupId) {
    const group = CONFIG.groups[groupId];
    if (!group || !group.videos || group.videos.length === 0) {
      content.innerHTML = '<div class="empty-tip">该产品暂无教程</div>';
      return;
    }
    pageTitle.textContent = group.name;
    if (group.desc) pageDesc.textContent = group.desc;

    if (group.videos.length === 1) {
      const vid = group.videos[0];
      const videoTitle = CONFIG.videos[vid];
      content.innerHTML = `
        <div class="video-card">
          <div class="video-container">
            <iframe src="//player.bilibili.com/player.html?bvid=${vid}&page=1&danmaku=0&high_quality=1&as_wide=1&no_recommend=1&hide_cover=1" scrolling="no" border="0" frameborder="no" framespacing="0" allowfullscreen="true" sandbox="allow-same-origin allow-scripts"></iframe>
          </div>
          <button class="hd-btn" onclick="goToBilibili('${vid}')">点此前往B站切换1080P高清</button>
          <div class="hd-tip">默认标准画质播放，若需更高清晰度，可点击按钮跳转B站自行调节</div>
        </div>
      `;
      return;
    }

    // 分组模式（多视频）
    content.innerHTML = `
      <div class="video-list">
        ${group.videos.map(vid => {
          const videoTitle = CONFIG.videos[vid];
          return `
            <div class="video-card">
              <div class="video-title">${videoTitle}</div>
              <div class="video-container">
                <iframe src="//player.bilibili.com/player.html?bvid=${vid}&page=1&danmaku=0&high_quality=1&as_wide=1&no_recommend=1&hide_cover=1" scrolling="no" border="0" frameborder="no" framespacing="0" allowfullscreen="true" sandbox="allow-same-origin allow-scripts"></iframe>
              </div>
              <button class="hd-btn" onclick="goToBilibili('${vid}')">点此前往B站切换1080P高清</button>
              <div class="hd-tip">默认标准画质播放，若需更高清晰度，可点击按钮跳转B站自行调节</div>
            </div>
          `;
        }).join('')}
      </div>
    `;
    return;
  }

  content.innerHTML = '<div class="empty-tip">请扫描产品说明书上的二维码查看对应教程</div>';
}

document.addEventListener('DOMContentLoaded', renderPage);
</script>
</body>
</html>
